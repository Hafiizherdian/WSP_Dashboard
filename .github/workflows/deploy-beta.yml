name: Deploy Beta to VPS

on:
  push:
    branches:
      - beta

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            echo "=== Masuk ke direktori dashboard_beta ==="
            cd ~/dashboard_beta
            echo "=== Pull kode terbaru dari branch beta ==="
            git pull origin beta
            echo "=== Install dependencies ==="
            npm ci
            echo "=== Build Next.js ==="
            npm run build
            echo "=== Restart PM2 ==="
            pm2 restart dashboard-beta --update-env
            echo "=== Save PM2 state ==="
            pm2 save
            echo "=== Deploy beta selesai ==="